<!DOCTYPE html>
<html>
<head>
<title>CHAOS.EXE</title>
<style>
body{
background:black;
margin:0;
overflow:hidden;
font-family:Arial;
}

button{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:40px;
padding:20px;
}

img{
position:absolute;
width:200px;
}
</style>
</head>

<body>

<button onclick="start()">🔥 START 🔥</button>

<script>

function start(){

document.querySelector("button").remove();

setInterval(()=>{

let img=document.createElement("img");

img.src="https://media.tenor.com/mCiM7CmGGI4AAAAd/rickroll-rick.gif";

img.style.left=Math.random()*window.innerWidth+"px";

img.style.top=Math.random()*window.innerHeight+"px";

document.body.appendChild(img);

setTimeout(()=>img.remove(),5000);

},200);

}

</script>

</body>
</html>
